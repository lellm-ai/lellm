[package]
name = "lellm-graph"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Graph/Node/Edge orchestration layer for LeLLM — with State, Delta, Checkpoint"
documentation = "https://docs.rs/lellm-graph"
repository = "https://github.com/lellm-ai/lellm"

[dependencies]
lellm-core.workspace = true
async-trait.workspace = true
indexmap.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
thiserror.workspace = true
uuid = { workspace = true, features = ["serde"] }

[dev-dependencies]
lellm-agent = { workspace = true }
lellm-derive = { workspace = true }
lellm-provider = { workspace = true, features = ["mock", "openai-compat"] }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures-util = { workspace = true }
